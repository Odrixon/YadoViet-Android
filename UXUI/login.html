<!DOCTYPE html>

<html class="light" lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
  <title>TroManager - Đăng nhập</title>

  <link

  <link

    rel="stylesheet" />
  <!-- Tailwind Configuration -->

            "primary": "#004bca",
            "surface-container-high": "#e5e8eb",
            "on-secondary": "#ffffff",
            "on-error-container": "#93000a",
            "secondary": "#006684",
            "outline": "#737687",
            "on-background": "#181c1e",
            "tertiary-fixed": "#ffdad7",
            "surface-tint": "#0052dc",
            "surface-container-low": "#f1f4f7",
            "secondary-fixed-dim": "#67d3ff",
            "on-secondary-fixed-variant": "#004d64",
            "tertiary": "#ae091d",
            "on-primary-container": "#f1f2ff",
            "background": "#f7fafd",
            "secondary-fixed": "#bde9ff",
            "on-tertiary-container": "#ffefee",
            "on-secondary-container": "#00526a",
            "tertiary-container": "#d22c32",
            "inverse-primary": "#b4c5ff",

            "on-primary": "#ffffff",

            "surface-container-lowest": "#ffffff",

            "on-secondary-fixed": "#001f2a",

  <style>
    body {
      font-family: 'Hanken Grotesk', sans-serif;
      background-color: #f7fafd;
      overflow-x: hidden;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0px);
      }
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="flex flex-col min-h-screen text-on-surface">
  <!-- Atmospheric Background Layers -->
  <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none bg-primary-fixed">
    <div class="absolute top-[-10%] left-[-10%] w-64 h-64 rounded-full bg-primary-container blur-3xl opacity-20"></div>
    <div class="absolute bottom-[-5%] right-[-5%] w-96 h-96 rounded-full bg-secondary-container blur-3xl opacity-20">
    </div>
  </div>
  <!-- Main Content Canvas -->
  <main
    class="relative z-10 flex flex-col items-center justify-center w-full min-h-screen px-margin-mobile py-xl justify-end">
    <!-- Header Branding Section -->
    <div class="absolute top-lg left-margin-mobile z-20 flex items-center gap-xs">
      <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg">
        <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">apartment</span>
      </div>
      <span class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">TroManager</span>
    </div>
    <!-- Login Card -->
    <div
      class="w-full max-w-sm glass-panel rounded-[2rem] p-lg shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-white/50 shadow-[0_-8px_40px_rgba(0,0,0,0.08)]">
      <div class="mb-lg">
        <h2 class="font-headline-lg text-headline-lg text-on-surface">Welcome back</h2>
        <p class="font-body-md text-body-md text-on-surface-variant">Vui lòng nhập thông tin đăng nhập của bạn</p>
      </div>
      <form class="space-y-md" onsubmit="event.preventDefault();">
        <!-- Phone Input -->
        <div class="space-y-base">
          <label class="font-label-md text-label-md text-on-surface-variant ml-base" for="phone">Số điện thoại</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors"
              data-icon="smartphone">smartphone</span>
            <input
              class="w-full h-14 pl-[52px] pr-md bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body-md text-body-md text-on-surface placeholder:text-outline-variant"
              id="phone" placeholder="Nhập số điện thoại" type="tel" />
          </div>
        </div>
        <!-- Password Input -->
        <div class="space-y-base">
          <label class="font-label-md text-label-md text-on-surface-variant ml-base" for="password">Mật khẩu</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors"
              data-icon="lock">lock</span>
            <input
              class="w-full h-14 pl-[52px] pr-[52px] bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body-md text-body-md text-on-surface placeholder:text-outline-variant"
              id="password" placeholder="Nhập mật khẩu" type="password" />
            <button
              class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors"
              type="button">
              <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
            </button>
          </div>
        </div>
        <!-- Forgot Password -->
        <div class="flex justify-end pt-base">
          <a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
        </div>
        <!-- Login Button -->
        <button
          class="w-full h-14 bg-primary text-on-primary font-headline-md text-headline-md rounded-xl shadow-[0px_8px_20px_rgba(0,75,202,0.25)] hover:bg-primary-container active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-xs"
          type="submit">
          Đăng nhập
          <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
        </button>
      </form>
      <!-- Divider -->
      <div class="flex items-center gap-md my-lg">
        <div class="flex-1 h-[1px] bg-outline-variant/30"></div>
        <span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Hoặc tiếp tục với</span>
        <div class="flex-1 h-[1px] bg-outline-variant/30"></div>
      </div>
      <!-- Social Logins -->
      <div class="grid grid-cols-2 gap-sm">
        <button
          class="flex items-center justify-center gap-xs h-12 bg-surface-container rounded-xl font-label-md text-label-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">
          <div class="w-6 h-6 rounded-full bg-white flex items-center justify-center overflow-hidden">
            <img class="w-4 h-4"
              data-alt="A clean, minimalist logo of Google on a white circular background, high resolution digital icon for a professional financial login screen."
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuAU-1_PkA1xdMifWDc7I6yUKEB_42LYXqCnZ4T4FPQhMwehMlO9SuoJ6rtIibESFvf79s9FS9MSqOR14j6O9xZIfNXL3jChQH51bpnCLzsXhoXlp0OQkOa54H4syi1CBwspXQOCXUzEzRVsJbYJy7Is2Ml5MDvuEv1RFjcalGwCrAS1k7RO6dvAAFhp3ZVEw4VOz78_C8_CEDR2EzGzPZ-c1KZpe6_Ct9RDxaF0oAdqh_V6D2uCrcBPdFJaW8uvbnE_L52a7l_a3Y8" />
          </div>
          Google
        </button>
        <button
          class="flex items-center justify-center gap-xs h-12 bg-[#0068FF] text-white rounded-xl font-label-md text-label-md hover:brightness-110 active:scale-95 transition-all">
          <div class="w-6 h-6 rounded-full bg-white flex items-center justify-center overflow-hidden p-[2px]">
            <img class="w-full h-full object-contain"
              data-alt="A modern Zalo application logo, featuring stylized white typography on a vibrant blue background, optimized for mobile app interface integration."
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuCewxz2clghW-Q5B-dpgNMIPruYM265cNwxiihX62mFs-BWlGSVatMpFd7BRIziiVznJwrQf15GovNVl24RjW4k7G3pCnEhLf5d0GxyCMUwIZW8rQFHNv0lO5aAF_dA27fxRxr5-ZXEhFqLe8ei72KkE-94Gu22PKm6qpzQ-jpEt759inSC5jwoPQvIYyDZpuFr5kzSFiEmeBO-SgC4DiFMZiLfigGO-nw-oINhVAUhWWwSNUAFoAKvI33NTtDNn95rW-mKXeGAudg" />
          </div>
          Zalo
        </button>
      </div>
    </div>
    <!-- Bottom Footer -->
    <div class="mt-xl text-center">
      <p class="font-body-md text-body-md text-on-surface-variant">
        Chưa có tài khoản?
        <a class="text-primary font-bold hover:underline transition-all" href="#">Đăng ký ngay</a>
      </p>
    </div>
  </main>
  <!-- Contextual Decorative Elements -->
  <!-- Notification Toast (Hidden by default) -->
  <div
    class="fixed top-xl left-1/2 -translate-x-1/2 z-50 glass-panel border border-primary/20 px-lg py-md rounded-2xl shadow-xl flex items-center gap-sm transform -translate-y-[200%] transition-transform duration-300 shadow-[0_-8px_40px_rgba(0,0,0,0.08)]"
    id="toast">
    <span class="material-symbols-outlined text-primary" data-icon="info">info</span>
    <p class="font-body-md text-body-md text-on-surface">Vui lòng nhập đầy đủ thông tin.</p>
  </div>
  <script>
    // Micro-interactions for the login flow
    const form = document.querySelector('form');
    const phoneInput = document.getElementById('phone');
    const passInput = document.getElementById('password');
    const toast = document.getElementById('toast');

    form.addEventListener('submit', (e) => {
      if (!phoneInput.value || !passInput.value) {
        showToast();
      }
    });

    function showToast() {
      toast.classList.remove('-translate-y-[200%]');
      setTimeout(() => {
        toast.classList.add('-translate-y-[200%]');
      }, 3000);
    }

    // Perspective tilt effect on the card
    const card = document.querySelector('.glass-panel');
    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth > 768) {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
      }
    });

    // Toggle Password visibility
    const toggleBtn = document.querySelector('button[type="button"]');
    toggleBtn.addEventListener('click', () => {
      const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passInput.setAttribute('type', type);
      toggleBtn.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
    });
  </script>
</body>

</html>
