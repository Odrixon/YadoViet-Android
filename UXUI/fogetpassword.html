<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Quên mật khẩu? - YadoViet</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap"

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e5e8eb",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-container": "#0061ff",
                        "primary": "#004bca",
                        "surface-dim": "#d7dadd",
                        "surface-container-highest": "#e0e3e6",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#25caff",
                        "surface-container": "#ebeef1",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "on-secondary-container": "#00526a",
                        "tertiary-container": "#d22c32",
                        "secondary-fixed": "#bde9ff",
                        "on-tertiary-container": "#ffefee",
                        "tertiary": "#ae091d",
                        "on-primary-container": "#f1f2ff",
                        "background": "#f7fafd",
                        "on-secondary-fixed-variant": "#004d64",
                        "tertiary-fixed": "#ffdad7",
                        "surface-tint": "#0052dc",
                        "surface-container-low": "#f1f4f7",
                        "secondary-fixed-dim": "#67d3ff",
                        "secondary": "#006684",
                        "outline": "#737687",
                        "on-background": "#181c1e",
                        "surface": "#f7fafd",
                        "on-tertiary-fixed": "#410004",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eef1f4",
                        "surface-bright": "#f7fafd",
                        "primary-fixed-dim": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-variant": "#e0e3e6",
                        "on-surface-variant": "#424656",
                        "on-primary-fixed": "#00174b",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c2c6d9",
                        "on-surface": "#181c1e",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-fixed-variant": "#930014",
                        "on-secondary-fixed": "#001f2a",
                        "tertiary-fixed-dim": "#ffb3ae"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "8px",
                        "lg": "24px",
                        "sm": "12px",
                        "md": "16px",
                        "margin-mobile": "16px",
                        "base": "4px",
                        "xl": "32px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],

                    "fontSize": {

                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],

                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],

                        "headline-lg-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "700" }]

                },
            },
        }

    <style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .focused-shadow:focus-within {
            box-shadow: 0 0 0 2px rgba(0, 75, 202, 0.2);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
    <!-- TopAppBar (Based on Shared Components JSON) -->
    <header
        class="w-full top-0 bg-background dark:bg-on-background flex items-center justify-between px-margin-mobile h-14 w-full z-50">
        <button aria-label="Quay lại"
            class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
            <span class="material-symbols-outlined text-primary dark:text-primary-fixed">arrow_back</span>
        </button>
        <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed">YadoViet</h1>
        <div class="w-10"></div> <!-- Spacer for center alignment -->
    </header>
    <!-- Main Content Canvas -->
    <main class="flex-1 w-full max-w-md px-margin-mobile py-lg flex flex-col">
        <!-- Header Section -->
        <div class="mb-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
            <h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Quên mật khẩu?</h2>
            <p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                email đã đăng ký để nhận mã xác thực (OTP)
            </p>
        </div>
        <!-- Input Form Section (Card-Based UI) -->
        <div
            class="bg-surface-container-lowest rounded-xl shadow-sm p-lg flex flex-col gap-lg animate-in fade-in slide-in-from-bottom-6 duration-700 delay-100">
            <div class="space-y-xs">
                <label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="phone-input">Số điện
                    thoại</label>
                <div class="relative group focused-shadow transition-shadow duration-200 rounded-xl">
                    <div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
                        <span
                            class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">phone_iphone</span>
                    </div>
                    <input autocomplete="tel"
                        class="w-full pl-xl pr-md py-sm bg-surface-container-low border-none rounded-xl font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary transition-all"
                        id="phone-input" placeholder="09xx xxx xxx" type="tel" />
                </div>
            </div>
            <button
                class="w-full bg-primary text-on-primary py-md px-lg rounded-full font-headline-md text-headline-md shadow-md hover:brightness-110 active:scale-95 transition-all duration-150 flex items-center justify-center gap-xs"
                id="submit-btn">
                Gửi mã OTP
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
            </button>
        </div>
        <!-- Support Info / Subtle Branding -->
        <div class="mt-auto py-xl text-center opacity-60">
            <p class="font-label-md text-label-md text-on-surface-variant">
                Gặp khó khăn? Liên hệ <span class="text-primary font-bold">Hỗ trợ</span>
            </p>
        </div>
    </main>
    <!-- Bottom Navigation Shell (Suppressed for transactional screen per mandate) -->
    <!-- Note: Following "The Destination Rule" and "Automatic Suppression" for Transactional flows -->
    <script>
        // Micro-interaction for the submit button
        const submitBtn = document.getElementById('submit-btn');
        const phoneInput = document.getElementById('phone-input');

        submitBtn.addEventListener('click', () => {
            if (!phoneInput.value.trim()) {
                phoneInput.classList.add('ring-2', 'ring-error');
                setTimeout(() => phoneInput.classList.remove('ring-2', 'ring-error'), 1500);
                return;
            }

            // Loading state animation
            submitBtn.innerHTML = `
                <div class="w-5 h-5 border-2 border-on-primary border-t-transparent rounded-full animate-spin"></div>
                <span class="ml-2">Đang gửi...</span>
            `;
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80');

            // Simulating API call
            setTimeout(() => {
                alert('Mã OTP đã được gửi đến email của bạn ' + phoneInput.value);
                submitBtn.innerHTML = `Gửi mã OTP <span class="material-symbols-outlined text-[18px]">arrow_forward</span>`;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80');
            }, 1500);
        });

        // Focus interaction for input
        phoneInput.addEventListener('focus', () => {
            phoneInput.parentElement.classList.add('focused-shadow');
        });
        phoneInput.addEventListener('blur', () => {
            phoneInput.parentElement.classList.remove('focused-shadow');
        });

        // Mask phone number logic (simplified)
        phoneInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 10) val = val.slice(0, 10);
            e.target.value = val;
        });
    </script>
</body>

</html>
