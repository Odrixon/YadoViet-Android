    <style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #f7fafd;
            -webkit-tap-highlight-color: transparent;
        }

        .otp-input:focus {
            border-color: #004bca;
            box-shadow: 0 0 0 2px rgba(0, 75, 202, 0.1);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .kinetic-button:active {
            transform: scale(0.96);
            transition: transform 0.1s ease-out;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="flex flex-col min-h-screen text-on-background">
    <!-- Top Navigation Bar -->
    <!-- Derived from TopAppBar JSON: style_shell_layout, style_bg_color, style_typography -->
    <header class="flex items-center justify-between px-margin-mobile h-14 w-full bg-background sticky top-0 z-50">
        <button aria-label="Go back"
            class="w-10 h-10 flex items-center justify-start text-on-surface active:scale-95 duration-150">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="font-headline-md text-headline-md text-on-surface flex-1 text-center">Xác minh OTP</h1>
        <div class="w-10"></div> <!-- Spacer for center alignment -->
    </header>
    <main class="flex-grow px-margin-mobile pt-lg flex flex-col">
        <!-- Brand identity illustration / atmospheric element -->
        <div class="mb-xl flex justify-center">
            <div class="relative w-24 h-24 bg-primary-fixed rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined text-[48px] text-primary"
                    data-icon="shield_person">shield_person</span>
                <div class="absolute -right-2 -bottom-2 bg-secondary-container p-2 rounded-xl shadow-sm">
                    <span class="material-symbols-outlined text-on-secondary-container" data-icon="sms">sms</span>
                </div>
            </div>
        </div>
        <!-- Text Section -->
        <section class="text-center mb-xl">
            <h2 class="font-headline-lg-mobile text-headline-lg-mobile mb-xs text-on-surface">Nhập mã xác thực</h2>
            <p class="font-body-md text-body-md text-on-surface-variant px-md">
                Mã OTP đã được gửi đến số điện thoại <span class="font-bold text-on-surface">09xx xxx xxx</span>
            </p>
        </section>
        <!-- OTP Input Grid (6 Digits) -->
        <div class="grid grid-cols-6 gap-gutter mb-lg max-w-sm mx-auto w-full">
            <input autofocus=""
                class="otp-input w-full aspect-square text-center font-headline-lg-mobile text-headline-lg-mobile bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none transition-all"
                inputmode="numeric" maxlength="1" type="text" value="" />
            <input
                class="otp-input w-full aspect-square text-center font-headline-lg-mobile text-headline-lg-mobile bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none transition-all"
                inputmode="numeric" maxlength="1" type="text" value="" />
            <input
                class="otp-input w-full aspect-square text-center font-headline-lg-mobile text-headline-lg-mobile bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none transition-all"
                inputmode="numeric" maxlength="1" type="text" value="" />
            <input
                class="otp-input w-full aspect-square text-center font-headline-lg-mobile text-headline-lg-mobile bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none transition-all"
                inputmode="numeric" maxlength="1" type="text" value="" />
            <input
                class="otp-input w-full aspect-square text-center font-headline-lg-mobile text-headline-lg-mobile bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none transition-all"
                inputmode="numeric" maxlength="1" type="text" value="" />
            <input
                class="otp-input w-full aspect-square text-center font-headline-lg-mobile text-headline-lg-mobile bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none transition-all"
                inputmode="numeric" maxlength="1" type="text" value="" />
        </div>
        <!-- Timer & Resend Section -->
        <div class="flex flex-col items-center gap-base mb-xl">
            <p class="font-label-md text-label-md text-on-surface-variant" id="timer-text">
                Gửi lại mã sau <span class="font-bold text-primary" id="seconds">59</span>s
            </p>
            <button class="hidden font-label-md text-label-md text-primary font-bold hover:underline" id="resend-btn"
                onclick="resetTimer()">
                Gửi lại mã
            </button>
        </div>
        <!-- Primary Action Button -->
        <div class="mt-auto pb-xl">
            <button
                class="kinetic-button w-full h-14 bg-primary text-on-primary font-headline-md text-headline-md rounded-xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-sm">
                Xác nhận
                <span class="material-symbols-outlined text-on-primary" data-icon="chevron_right">chevron_right</span>
            </button>
        </div>
    </main>
    <!-- Support Link Footer -->
    <!-- Matches BottomNavBar JSON logic: fixed bottom, shell_layout, style_bg_color -->
    <footer
        class="fixed bottom-0 left-0 w-full flex justify-center items-center py-lg px-margin-mobile bg-surface-container-lowest/80 backdrop-blur-xl border-t border-outline-variant/30">
        <a class="flex items-center gap-xs text-on-surface-variant hover:opacity-80 transition-opacity" href="#">
            <span class="font-label-md text-label-md">Gặp khó khăn?</span>
            <span class="font-label-md text-label-md text-primary font-bold underline">Liên hệ Hỗ trợ</span>
        </a>
    </footer>
    <!-- Interactive Scripts -->
    <script>
        // OTP Auto-focus logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Countdown Timer logic
        let timeLeft = 59;
        const timerText = document.getElementById('timer-text');
        const secondsSpan = document.getElementById('seconds');
        const resendBtn = document.getElementById('resend-btn');

        function startTimer() {
            const countdown = setInterval(() => {
                timeLeft--;
                secondsSpan.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerText.classList.add('hidden');
                    resendBtn.classList.remove('hidden');
                }
            }, 1000);
        }

        function resetTimer() {
            timeLeft = 59;
            secondsSpan.textContent = timeLeft;
            timerText.classList.remove('hidden');
            resendBtn.classList.add('hidden');
            startTimer();
            // Mock resend feedback
            alert('Một mã OTP mới đã được gửi!');
        }

        startTimer();
    </script>
</body>

</html>
